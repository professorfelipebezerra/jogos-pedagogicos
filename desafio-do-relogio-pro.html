<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio do Relógio Interativo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff6b6b;
            --primary-dark: #ee5253;
            --secondary: #4ea8de;
            --background: #f7f9fc;
            --text: #2c3e50;
            --success: #1dd1a1;
            --clock-bg: #ffffff;
            --clock-border: #2c3e50;
        }

        * {
            box-sizing: border-box;
            font-family: 'Fredoka', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 28px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 520px;
            text-align: center;
        }

        h1 {
            color: var(--secondary);
            margin: 0 0 5px 0;
            font-size: 2rem;
        }

        .badge {
            background-color: #e2f0fe;
            color: #1d70b8;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: inline-block;
        }

        /* Controles de Configuração */
        .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-bottom: 15px;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 16px;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .control-label {
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .select-type {
            padding: 6px 10px;
            border-radius: 10px;
            border: 2px solid #cbd5e1;
            font-family: inherit;
            font-weight: 600;
            color: var(--text);
            outline: none;
            cursor: pointer;
            flex: 1;
            max-width: 250px;
            font-size: 0.9rem;
        }

        /* Configuração do Horário Customizado do Professor */
        .custom-time-box {
            display: none;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
            padding-top: 10px;
            border-top: 1px dashed #cbd5e1;
            width: 100%;
            justify-content: center;
        }

        .custom-time-input {
            padding: 8px;
            border-radius: 10px;
            border: 2px solid #cbd5e1;
            font-family: inherit;
            font-weight: 600;
            color: var(--text);
            text-align: center;
            font-size: 1rem;
        }

        .btn-apply {
            background-color: var(--text);
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 3px 0px #1a252f;
            transition: all 0.1s ease;
        }

        .btn-apply:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0px #1a252f;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--secondary);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        /* Painel de Desafio */
        .challenge-box {
            background: #fff9db;
            border: 2px dashed #f59f00;
            padding: 15px;
            border-radius: 16px;
            width: 100%;
            font-size: 1.3rem;
            margin-bottom: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .challenge-box.realtime-mode {
            background: #e2f0fe;
            border-color: #4ea8de;
            color: #1d70b8;
        }

        .challenge-box.realtime-mode .challenge-time {
            color: #1d70b8;
        }

        .challenge-time {
            color: #f59f00;
            font-size: 1.8rem;
            font-weight: 700;
            display: block;
            margin-top: 5px;
        }

        /* Estrutura Visual do Relógio */
        .clock-wrapper {
            position: relative;
            width: 340px;
            height: 340px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clock {
            width: 280px;
            height: 280px;
            background: var(--clock-bg);
            border: 10px solid var(--clock-border); 
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 0 4px #cbd5e0, inset 0 4px 10px rgba(0,0,0,0.05), 0 8px 20px rgba(0,0,0,0.15);
        }

        .clock::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: #2c3e50;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .number {
            position: absolute;
            font-size: 1.5rem;
            font-weight: 700;
            color: #4a5568;
            text-align: center;
            width: 40px;
            height: 40px;
            line-height: 40px;
            z-index: 3;
        }

        .minute-label {
            position: absolute;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--secondary);
            text-align: center;
            width: 30px;
            height: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .minute-label.visible {
            opacity: 1;
        }

        /* Ponteiros */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
            transform: rotate(0deg);
        }

        .hour-hand {
            width: 7px;
            height: 65px;
            background-color: #2c3e50;
            margin-left: -3.5px;
            z-index: 4;
            pointer-events: none; /* Padrão bloqueado (movimento engrenagem) */
        }

        /* Área de clique expandida para o ponteiro das horas no modo independente */
        .hour-hand::before {
            content: '';
            position: absolute;
            width: 40px;
            height: 80px;
            top: -10px;
            left: -16.5px;
            background: transparent;
        }

        .minute-hand {
            width: 5px;
            height: 95px;
            background-color: var(--secondary);
            margin-left: -2.5px;
            z-index: 5;
            cursor: grab;
        }

        .minute-hand:active {
            cursor: grabbing;
        }

        .minute-hand::before {
            content: '';
            position: absolute;
            width: 40px;
            height: 110px;
            top: -10px;
            left: -17.5px;
            background: transparent;
        }

        /* Ativa arrastar ponteiro de horas apenas quando no modo independente */
        .mode-independent .hour-hand {
            pointer-events: auto;
            cursor: grab;
        }

        .mode-independent .hour-hand:active {
            cursor: grabbing;
        }

        .tick {
            position: absolute;
            width: 2px;
            height: 7px;
            background: #cbd5e0;
            top: 4px;
            left: 50%;
            margin-left: -1px;
            transform-origin: center 126px;
            z-index: 1;
        }

        .tick.large {
            height: 14px;
            background: #a0aec0;
            width: 3px;
            margin-left: -1.5px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .btn {
            border: none;
            padding: 14px 20px;
            font-size: 1.15rem;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.1s ease;
            flex: 1;
        }

        .btn-check {
            background-color: var(--success);
            color: white;
            box-shadow: 0 5px 0px #10ac84;
        }

        .btn-check:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0px #10ac84;
        }

        .btn-next {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 5px 0px var(--primary-dark);
        }

        .btn-next:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0px var(--primary-dark);
        }

        /* Assinatura do Professor */
        .footer-signature {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Modal de Feedback */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(44, 62, 80, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: white;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transform: scale(0.8);
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.25);
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        .modal-icon {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .modal-title {
            font-size: 1.8rem;
            margin: 0 0 10px 0;
        }

        .modal-text {
            font-size: 1.1rem;
            color: #556a7e;
            margin-bottom: 20px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Desafio do Relógio</h1>
        <span class="badge">Aprenda a ler as horas!</span>

        <!-- Painel de Configurações Pedagógicas -->
        <div class="controls-panel">
            <div class="control-row">
                <span class="control-label"><i class="fa-solid fa-stopwatch"></i> Exercício:</span>
                <select id="timeTypeSelect" class="select-type">
                    <option value="multiple5">Múltiplos de 5 min (Tabuada do 5)</option>
                    <option value="sharp">Horas Fechadas (ex: 3:00)</option>
                    <option value="any">Qualquer minuto (ex: 14:37)</option>
                    <option value="custom">Definido pelo Professor</option>
                    <option value="realtime">Hora Atual (Tempo Real)</option>
                </select>
            </div>

            <div class="control-row" id="movementModeRow">
                <span class="control-label"><i class="fa-solid fa-arrows-rotate"></i> Movimento:</span>
                <select id="movementModeSelect" class="select-type">
                    <option value="linked">Juntos (Engrenagem)</option>
                    <option value="independent">Independentes (Livres)</option>
                </select>
            </div>
            
            <div class="custom-time-box" id="customTimeContainer">
                <span class="control-label">Nova Hora:</span>
                <input type="time" id="customTimeInput" class="custom-time-input" value="12:00">
                <button class="btn-apply" id="btnApplyCustomTime">Aplicar</button>
            </div>

            <div class="control-row">
                <span class="control-label"><i class="fa-solid fa-eye"></i> Ajuda dos minutos:</span>
                <label class="switch">
                    <input type="checkbox" id="toggleMinutes">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="challenge-box" id="challengeBox">
            <span id="challengeText">Coloque o relógio no horário:</span>
            <span class="challenge-time" id="targetTimeDisplay">--:--</span>
        </div>

        <div class="clock-wrapper" id="wrapperElement">
            <div class="clock" id="clockElement">
                <div class="hand hour-hand" id="hourHand"></div>
                <div class="hand minute-hand" id="minuteHand"></div>
            </div>
        </div>

        <div class="button-group" id="buttonGroup">
            <button class="btn btn-next" id="btnNext"><i class="fa-solid fa-dice"></i> Sortear</button>
            <button class="btn btn-check" id="btnCheck"><i class="fa-solid fa-circle-check"></i> Verificar</button>
        </div>

        <!-- Assinatura do Professor -->
        <!--<div class="footer-signature">Prof. Felipe Bezerra</div> -->
    </div>

    <!-- Modal de Resposta -->
    <div class="modal-overlay" id="feedbackModal">
        <div class="modal-card">
            <div class="modal-icon" id="modalIcon">🎉</div>
            <h2 class="modal-title" id="modalTitle">Parabéns!</h2>
            <p class="modal-text" id="modalText">Você acertou a hora em cheio!</p>
            <button class="btn btn-next" id="btnModalClose" style="width: 100%;">Continuar</button>
        </div>
    </div>

    <script>
        const clock = document.getElementById('clockElement');
        const wrapper = document.getElementById('wrapperElement');
        const hourHand = document.getElementById('hourHand');
        const minuteHand = document.getElementById('minuteHand');
        const targetDisplay = document.getElementById('targetTimeDisplay');
        const challengeBox = document.getElementById('challengeBox');
        const challengeText = document.getElementById('challengeText');
        const buttonGroup = document.getElementById('buttonGroup');
        
        const btnCheck = document.getElementById('btnCheck');
        const btnNext = document.getElementById('btnNext');
        const btnModalClose = document.getElementById('btnModalClose');
        const feedbackModal = document.getElementById('feedbackModal');
        const toggleMinutes = document.getElementById('toggleMinutes');
        
        const timeTypeSelect = document.getElementById('timeTypeSelect');
        const movementModeSelect = document.getElementById('movementModeSelect');
        const movementModeRow = document.getElementById('movementModeRow');
        const customTimeContainer = document.getElementById('customTimeContainer');
        const customTimeInput = document.getElementById('customTimeInput');
        const btnApplyCustomTime = document.getElementById('btnApplyCustomTime');

        let targetHour = 0;
        let targetMinute = 0;
        
        // Estado do Relógio
        let movementMode = 'linked'; // 'linked' ou 'independent'
        let totalMinutesElapsed = 12 * 60; // Usado para modo engrenagem (Juntos)
        let indepMinuteAngle = 0; // Usado para modo Independente
        let indepHourAngle = 0;   // Usado para modo Independente
        
        let lastAngleDeg = 0;
        let isDragging = false;
        let activeHand = null;
        let realtimeInterval = null;

        function buildClockVisuals() {
            const centerX = 130;
            const centerY = 130;

            for (let i = 1; i <= 12; i++) {
                const number = document.createElement('div');
                number.className = 'number';
                number.textContent = i;
                
                const angle = (i * 30) * (Math.PI / 180);
                const radius = 102;
                const x = centerX + radius * Math.sin(angle) - 20;
                const y = centerY - radius * Math.cos(angle) - 20;
                
                number.style.left = `${x}px`;
                number.style.top = `${y}px`;
                clock.appendChild(number);
            }

            for (let i = 0; i < 60; i++) {
                const tick = document.createElement('div');
                tick.className = i % 5 === 0 ? 'tick large' : 'tick';
                tick.style.transform = `rotate(${i * 6}deg)`;
                clock.appendChild(tick);
            }

            for (let i = 0; i < 12; i++) {
                const minVal = i * 5;
                const label = document.createElement('div');
                label.className = 'minute-label';
                label.textContent = String(minVal).padStart(2, '0');
                
                const angle = (i * 30) * (Math.PI / 180);
                const radius = 158;
                const x = 170 + radius * Math.sin(angle) - 15;
                const y = 170 - radius * Math.cos(angle) - 10;
                
                label.style.left = `${x}px`;
                label.style.top = `${y}px`;
                wrapper.appendChild(label);
            }
        }

        toggleMinutes.addEventListener('change', function() {
            document.querySelectorAll('.minute-label').forEach(label => {
                label.classList.toggle('visible', this.checked);
            });
        });

        // Alternar modo de movimento (Juntos vs Independentes)
        movementModeSelect.addEventListener('change', (e) => {
            movementMode = e.target.value;
            if (movementMode === 'independent') {
                wrapper.classList.add('mode-independent');
                // Sincroniza os ângulos independentes com a posição mecânica atual
                indepMinuteAngle = (totalMinutesElapsed * 6) % 360;
                indepHourAngle = (totalMinutesElapsed * 0.5) % 360;
            } else {
                wrapper.classList.remove('mode-independent');
                // Retoma a engrenagem a partir de onde os ponteiros independentes pararam
                let h = Math.round(indepHourAngle / 30);
                if (h === 0) h = 12;
                let m = Math.round(indepMinuteAngle / 6);
                totalMinutesElapsed = (h * 60) + m;
                updateClockPointersGraphics();
            }
        });

        timeTypeSelect.addEventListener('change', () => {
            if (timeTypeSelect.value === 'realtime') {
                customTimeContainer.style.display = 'none';
                startRealTime();
            } else {
                stopRealTime();
                if (timeTypeSelect.value === 'custom') {
                    customTimeContainer.style.display = 'flex';
                    btnNext.style.display = 'none';
                    applyCustomTime();
                } else {
                    customTimeContainer.style.display = 'none';
                    btnNext.style.display = 'block';
                    generateChallenge();
                }
            }
        });

        function applyCustomTime() {
            const timeVal = customTimeInput.value;
            if (!timeVal) return;
            const [h, m] = timeVal.split(':').map(Number);
            targetHour = h;
            targetMinute = m;
            updateDisplayAndResetPointers();
        }

        btnApplyCustomTime.addEventListener('click', applyCustomTime);

        // Modo Tempo Real (Hora Atual)
        function startRealTime() {
            if(realtimeInterval) clearInterval(realtimeInterval);
            
            challengeBox.classList.add('realtime-mode');
            challengeText.textContent = "Mostrando a Hora Atual:";
            buttonGroup.style.display = 'none';
            movementModeRow.style.display = 'none';
            movementMode = 'linked'; // Força para linked para acompanhar real o tempo
            wrapper.classList.remove('mode-independent');

            const updateRealTime = () => {
                const agora = new Date();
                const h = agora.getHours();
                const m = agora.getMinutes();
                const s = agora.getSeconds();
                
                targetDisplay.textContent = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                
                // Transforma horas, minutos e segundos em minutos fracionados absolutos
                totalMinutesElapsed = (h % 12) * 60 + m + (s / 60);
                updateClockPointersGraphics();
            };
            
            updateRealTime();
            realtimeInterval = setInterval(updateRealTime, 1000);
        }

        function stopRealTime() {
            if(realtimeInterval) clearInterval(realtimeInterval);
            challengeBox.classList.remove('realtime-mode');
            challengeText.textContent = "Coloque o relógio no horário:";
            buttonGroup.style.display = 'flex';
            movementModeRow.style.display = 'flex';
            movementMode = movementModeSelect.value;
            if (movementMode === 'independent') wrapper.classList.add('mode-independent');
        }

        function generateChallenge() {
            if (timeTypeSelect.value === 'custom' || timeTypeSelect.value === 'realtime') return;
            
            if (timeTypeSelect.value === 'any') {
                targetHour = Math.floor(Math.random() * 24); 
                targetMinute = Math.floor(Math.random() * 60); 
            } else if (timeTypeSelect.value === 'sharp') {
                targetHour = Math.floor(Math.random() * 12) + 1; 
                targetMinute = 0;
            } else {
                targetHour = Math.floor(Math.random() * 12) + 1;
                targetMinute = Math.floor(Math.random() * 12) * 5; 
            }
            
            updateDisplayAndResetPointers();
        }

        function updateDisplayAndResetPointers() {
            const formattedHour = String(targetHour).padStart(2, '0');
            const formattedMinute = String(targetMinute).padStart(2, '0');
            targetDisplay.textContent = `${formattedHour}:${formattedMinute}`;

            totalMinutesElapsed = 12 * 60; 
            indepMinuteAngle = 0;
            indepHourAngle = 0;
            lastAngleDeg = 0;
            updateClockPointersGraphics();
            
            closeModal();
        }

        function startDrag(e, handType) {
            if (timeTypeSelect.value === 'realtime') return;
            isDragging = true;
            activeHand = handType;

            const rect = clock.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const deltaX = clientX - centerX;
            const deltaY = clientY - centerY;
            let angleRad = Math.atan2(deltaY, deltaX);
            lastAngleDeg = angleRad * (180 / Math.PI) + 90;
            if (lastAngleDeg < 0) lastAngleDeg += 360;
        }

        function handleRotation(e) {
            if (!isDragging) return;

            const rect = clock.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const deltaX = clientX - centerX;
            const deltaY = clientY - centerY;

            let angleRad = Math.atan2(deltaY, deltaX);
            let currentAngleDeg = angleRad * (180 / Math.PI) + 90;
            if (currentAngleDeg < 0) currentAngleDeg += 360;

            let angleDifference = currentAngleDeg - lastAngleDeg;

            if (angleDifference > 180) angleDifference -= 360;
            if (angleDifference < -180) angleDifference += 360;

            if (movementMode === 'linked') {
                totalMinutesElapsed += angleDifference / 6;
                if (totalMinutesElapsed < 0) totalMinutesElapsed += 720;
                if (totalMinutesElapsed >= 720) totalMinutesElapsed -= 720;
            } else {
                if (activeHand === 'minute') {
                    indepMinuteAngle += angleDifference;
                    if(indepMinuteAngle < 0) indepMinuteAngle += 360;
                    if(indepMinuteAngle >= 360) indepMinuteAngle -= 360;
                } else if (activeHand === 'hour') {
                    indepHourAngle += angleDifference;
                    if(indepHourAngle < 0) indepHourAngle += 360;
                    if(indepHourAngle >= 360) indepHourAngle -= 360;
                }
            }

            lastAngleDeg = currentAngleDeg;
            updateClockPointersGraphics();
        }

        function endDrag() {
            if (!isDragging) return;
            isDragging = false;

            if (movementMode === 'linked') {
                let roundedTotal = Math.round(totalMinutesElapsed);
                let minutePart = roundedTotal % 60;
                
                if (timeTypeSelect.value === 'multiple5' || timeTypeSelect.value === 'sharp') {
                    for (let m = 0; m <= 60; m += 5) {
                        if (Math.abs(minutePart - m) <= 2) {
                            let snappedMinute = m % 60;
                            roundedTotal += (m === 60) ? (60 - minutePart) : (snappedMinute - minutePart);
                            break;
                        }
                    }
                }
                totalMinutesElapsed = roundedTotal;
                if (totalMinutesElapsed < 0) totalMinutesElapsed += 720;
                if (totalMinutesElapsed >= 720) totalMinutesElapsed -= 720;

            } else {
                // Fechamentos (snaps) pro modo independente
                if (activeHand === 'minute') {
                    let currentMin = Math.round(indepMinuteAngle / 6);
                    if (timeTypeSelect.value === 'multiple5' || timeTypeSelect.value === 'sharp') {
                        for (let m = 0; m <= 60; m += 5) {
                            if (Math.abs(currentMin - m) <= 2) {
                                currentMin = m % 60;
                                break;
                            }
                        }
                    }
                    indepMinuteAngle = currentMin * 6;
                } else if (activeHand === 'hour') {
                    // Trava magnética na hora exata quando no modo independente
                    let currentH = Math.round(indepHourAngle / 30);
                    indepHourAngle = currentH * 30;
                }
            }

            updateClockPointersGraphics();
        }

        function updateClockPointersGraphics() {
            if (movementMode === 'linked' || timeTypeSelect.value === 'realtime') {
                minuteHand.style.transform = `rotate(${totalMinutesElapsed * 6}deg)`;
                hourHand.style.transform = `rotate(${totalMinutesElapsed * 0.5}deg)`;
            } else {
                minuteHand.style.transform = `rotate(${indepMinuteAngle}deg)`;
                hourHand.style.transform = `rotate(${indepHourAngle}deg)`;
            }
        }

        function checkAnswer() {
            const modalIcon = document.getElementById('modalIcon');
            const modalTitle = document.getElementById('modalTitle');
            const modalText = document.getElementById('modalText');

            let currentWholeHour, currentWholeMinute;

            if (movementMode === 'linked') {
                currentWholeHour = Math.floor(Math.round(totalMinutesElapsed) / 60);
                if (currentWholeHour === 0) currentWholeHour = 12;
                currentWholeMinute = Math.round(totalMinutesElapsed) % 60;
            } else {
                currentWholeHour = Math.round(indepHourAngle / 30);
                if (currentWholeHour === 0) currentWholeHour = 12;
                currentWholeMinute = Math.round(indepMinuteAngle / 6) % 60;
            }

            let target12h = targetHour % 12;
            if (target12h === 0) target12h = 12;

            if (currentWholeMinute === targetMinute && currentWholeHour === target12h) {
                modalIcon.textContent = "🎉";
                modalTitle.textContent = "Muito bem!";
                modalTitle.style.color = "var(--success)";
                
                if (timeTypeSelect.value === 'multiple5' || timeTypeSelect.value === 'sharp') {
                    const multiplicadorTabuada = targetMinute / 5;
                    if(targetMinute === 0) {
                        modalText.innerHTML = `Você posicionou o relógio perfeitamente nas <strong>${targetHour} horas</strong>!`;
                    } else {
                        modalText.innerHTML = `Perfeito! Ponteiro das horas no <strong>${target12h}</strong> e o azul no <strong>${multiplicadorTabuada}</strong>.<br>Tabuada: <strong>5 × ${multiplicadorTabuada} = ${targetMinute} min</strong>!`;
                    }
                } else {
                    modalText.innerHTML = `Incrível! Você ajustou perfeitamente o horário de <strong>${String(targetHour).padStart(2, '0')}:${String(targetMinute).padStart(2, '0')}</strong> no relógio de ponteiros!`;
                }
                
                spawnConfetti();
            } else {
                modalIcon.textContent = "🔍";
                modalTitle.textContent = "Quase lá...";
                modalTitle.style.color = "var(--primary-dark)";
                
                modalText.innerHTML = `Seu relógio está marcando <strong>${currentWholeHour}:${String(currentWholeMinute).padStart(2, '0')}</strong>.<br>O objetivo era ajustar para <strong>${String(targetHour).padStart(2, '0')}:${String(targetMinute).padStart(2, '0')}</strong>!`;
            }

            feedbackModal.classList.add('active');
        }

        function closeModal() {
            feedbackModal.classList.remove('active');
        }

        function spawnConfetti() {
            for(let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.width = Math.random() * 8 + 6 + 'px';
                confetti.style.height = Math.random() * 12 + 8 + 'px';
                const colors = ['#ff6b6b', '#4ea8de', '#1dd1a1', '#f59f00', '#af71e9'];
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-20px';
                confetti.style.zIndex = '9999';
                confetti.style.pointerEvents = 'none';
                document.body.appendChild(confetti);
                
                const animation = confetti.animate([
                    { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                    { transform: `translateY(105vh) translateX(${Math.random() * 80 - 40}px) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                ], { duration: Math.random() * 1000 + 1200, easing: 'ease-out' });
                
                animation.onfinish = () => confetti.remove();
            }
        }

        // Eventos Ponteiro dos Minutos
        minuteHand.addEventListener('mousedown', (e) => startDrag(e, 'minute'));
        minuteHand.addEventListener('touchstart', (e) => startDrag(e, 'minute'), {passive: false});

        // Eventos Ponteiro das Horas (Só reagem quando independentes via CSS pointer-events)
        hourHand.addEventListener('mousedown', (e) => startDrag(e, 'hour'));
        hourHand.addEventListener('touchstart', (e) => startDrag(e, 'hour'), {passive: false});

        // Eventos Globais de Movimento
        window.addEventListener('mouseup', endDrag);
        window.addEventListener('mousemove', handleRotation);
        window.addEventListener('touchend', endDrag);
        window.addEventListener('touchmove', handleRotation, {passive: false});

        // Botões
        btnCheck.addEventListener('click', checkAnswer);
        btnNext.addEventListener('click', generateChallenge);
        
        btnModalClose.addEventListener('click', () => {
            closeModal();
            if (timeTypeSelect.value !== 'custom' && timeTypeSelect.value !== 'realtime') {
                generateChallenge();
            }
        });

        window.onload = () => {
            buildClockVisuals();
            generateChallenge();
        };
    </script>
</body>
</html>
